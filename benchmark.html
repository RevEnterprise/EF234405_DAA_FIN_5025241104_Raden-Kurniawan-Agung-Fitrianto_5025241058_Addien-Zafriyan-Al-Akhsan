<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinding Benchmark</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbar">
        Pathfinding Benchmark
        <a href="index.html" class="nav-link">&#8594; Go to Visualizer</a>
    </div>

    <div id="app">

        <div id="leftPanel">
            <label for="mapPresetSelect">Presets:</label>
            <select id="mapPresetSelect">
                <option value="surabaya" selected>Surabaya (10,000+ Nodes)</option>
                <option value="nodes5000">5.000 Nodes</option>
                <option value="nodes1000">1.000 Nodes</option>
            </select>

            <label style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #cbd5e1;">Starting Node:</label>
            <div class="input-container">
                <input type="text" id="startNodeInput" placeholder="Right-click map to set..." readonly>
                <button id="clearStartBtn" class="trash-btn" title="Clear Starting Node">X</button>
            </div>

            <label>Destination Node:</label>
            <div class="input-container">
                <input type="text" id="destinationNodeInput" placeholder="Right-click map to set..." readonly>
                <button id="clearDestBtn" class="trash-btn" title="Clear Destination Node">X</button>
            </div>

            <button id="startBtn" style="margin-top: 15px;">Run Benchmark</button>
            <button id="resetBtn">Reset View</button>

            <div class="generator-section" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #cbd5e1; display: flex; flex-direction: column; gap: 8px;">
                <h4 style="margin: 0 0 10px 0; color: #2d3748;">Procedural Map Generator</h4>
                <label for="nodeCountInput">Number of Nodes:</label>
                <input type="number" id="nodeCountInput" value="5000" min="10" max="25000" style="width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; margin-bottom: 4px;">
                <button id="generateBtn">Generate New Map</button>
            </div>
        </div>

        <div id="middlePanel">
            <div id="canvasContainer">
                <canvas id="roadNetworkCanvas"></canvas>
            </div>
        </div>

        <div id="rightPanel">
            <h3>Playback Control</h3>
            
            <div id="playbackSelectionSection" style="margin-bottom: 12px;">
                <label for="playbackAlgoSelect" style="font-weight: 600; font-size: 13px; color: #4a5568; display: block; margin-bottom: 4px;">Active View Target:</label>
                <select id="playbackAlgoSelect">
                    <option value="dijkstra">Dijkstra's Algorithm</option>
                    <option value="bfs">Breadth-First Search (BFS)</option>
                    <option value="astar">A* Search Algorithm</option>
                </select>
            </div>

            <div id="stepControls" style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button id="playPauseBtn" style="flex: 1; padding: 10px;" disabled>▶ Play</button>
                <button id="stepResetBtn" style="padding: 10px;">↺ Reset</button>
            </div>

            <div style="width: 100%;">
                <input type="range" id="timelineSlider" min="0" max="0" value="0" style="width: 100%; cursor: pointer;" disabled>
                <div style="display: flex; justify-content: space-between; font-size: 13px; color: #718096; margin-top: 6px; font-family: monospace;">
                    <span>Progress:</span>
                    <span id="stepIndicator">0 / 0</span>
                </div>
            </div>

            <div id="statsPanel" style="margin-top: 25px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
                <h4 style="margin: 0 0 12px 0; color: #2d3748;">Performance Results Matrix</h4>
                
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; font-family: sans-serif;">
                    <thead>
                        <tr style="border-bottom: 2px solid #cbd5e1; color: #4a5568; background-color: #f7fafc;">
                            <th style="padding: 8px 4px;">Algorithm</th>
                            <th style="padding: 8px 4px;">Time</th>
                            <th style="padding: 8px 4px;">Visited</th>
                            <th style="padding: 8px 4px;">Weight</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr id="row-dijkstra" style="border-bottom: 1px solid #e2e8f0;">
                            <td style="padding: 8px 4px; font-weight: bold;">Dijkstra</td>
                            <td id="time-dijkstra" style="padding: 8px 4px; font-family: monospace;">-</td>
                            <td id="visited-dijkstra" style="padding: 8px 4px;">-</td>
                            <td id="weight-dijkstra" style="padding: 8px 4px;">-</td>
                        </tr>
                        <tr id="row-bfs" style="border-bottom: 1px solid #e2e8f0;">
                            <td style="padding: 8px 4px; font-weight: bold;">BFS</td>
                            <td id="time-bfs" style="padding: 8px 4px; font-family: monospace;">-</td>
                            <td id="visited-bfs" style="padding: 8px 4px;">-</td>
                            <td id="weight-bfs" style="padding: 8px 4px;">-</td>
                        </tr>
                        <tr id="row-astar" style="border-bottom: 1px solid #e2e8f0;">
                            <td style="padding: 8px 4px; font-weight: bold;">A* Search</td>
                            <td id="time-astar" style="padding: 8px 4px; font-family: monospace;">-</td>
                            <td id="visited-astar" style="padding: 8px 4px;">-</td>
                            <td id="weight-astar" style="padding: 8px 4px;">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div style="font-size:12px;color:#6b7a8f;margin-top:auto; border: 1px solid #e2e8f0; padding: 10px; border-radius: 4px; background-color: #f7fafc;">
                <span>💡 Right click to show context menu</span>
            </div>
        </div>
    </div>

    <div id="contextMenu"></div>

    <div id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
